<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section>

            <div class="display">
                <p id="expression"></p>
                <p id="result"></p>
            </div>

            <div class="calcButtons">
                <div class="leftButtons">
                    <div>
                        <button class="whiteButton">⌫</button>
                        <button class="whiteButton">AC</button>
                        <button class="whiteButton">/</button>
                    </div>

                    <div>
                        <button class="pinkButton">7</button>
                        <button class="pinkButton">8</button>
                        <button class="pinkButton">9</button>
                    </div>

                    <div>
                        <button class="pinkButton">6</button>
                        <button class="pinkButton">5</button>
                        <button class="pinkButton">4</button>
                    </div>

                    <div>
                        <button class="pinkButton">1</button>
                        <button class="pinkButton">2</button>
                        <button class="pinkButton">3</button>
                    </div>

                    <div>
                        <button class="pinkButton zeroButton">0</button>
                        <button class="whiteButton"><strong>.</strong></button>
                    </div>
                </div>

                <div class="rightButtons">
                    <button class="whiteButton">*</button>
                    <button class="whiteButton">-</button>
                    <button class="whiteButton addButton">+</button>
                    <button class="pinkerButton">=</button>
                </div>
            </div>

        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
