<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <!-- favicon -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.png">

    <!-- SEO meta tags -->
    <meta name="description"
        content="A simple calculator built with HTML, CSS, and JavaScript. Perform basic arithmetic operations with ease.">
    <meta name="keywords" content="calculator, HTML, CSS, JavaScript, arithmetic operations, web development">
    <meta name="author" content="Anaid Ariwany">
    <meta name="robots" content="index, follow">

    <!-- open graph meta tags -->
    <meta property="og:title" content="Calculator">
    <meta property="og:description"
        content="A simple calculator built with HTML, CSS, and JavaScript. Perform basic arithmetic operations with ease.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://anaid-ariwany.github.io/Calculator/">
    <meta property="og:image" content="https://anaid-ariwany.github.io/Calculator/assets/calculator.webp">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section>

            <div class="display">
                <p id="expression"></p>
                <p id="result"></p>
            </div>

            <div class="calcButtons">
                <div class="leftButtons">
                    <div>
                        <button class="whiteButton">⌫</button>
                        <button class="whiteButton">AC</button>
                        <button class="whiteButton">/</button>
                    </div>

                    <div>
                        <button class="pinkButton">7</button>
                        <button class="pinkButton">8</button>
                        <button class="pinkButton">9</button>
                    </div>

                    <div>
                        <button class="pinkButton">6</button>
                        <button class="pinkButton">5</button>
                        <button class="pinkButton">4</button>
                    </div>

                    <div>
                        <button class="pinkButton">1</button>
                        <button class="pinkButton">2</button>
                        <button class="pinkButton">3</button>
                    </div>

                    <div>
                        <button class="pinkButton zeroButton">0</button>
                        <button class="whiteButton"><strong>.</strong></button>
                    </div>
                </div>

                <div class="rightButtons">
                    <button class="whiteButton">*</button>
                    <button class="whiteButton">-</button>
                    <button class="whiteButton addButton">+</button>
                    <button class="pinkerButton">=</button>
                </div>
            </div>

        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
