<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section>

            <div>
                <h4>display</h4>
            </div>

            <div>
                <button>
                    <img src="assets/icons/backspace.webp" alt="backspace">
                </button>
                <button>AC</button>
                <button>/</button>
                <button>*</button>
            </div>

            <div>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>-</button>
            </div>

            <div>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>+</button>
            </div>

            <div>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>=</button>
            </div>

            <div>
                <button>0</button>
                <button>.</button>
            </div>

        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
